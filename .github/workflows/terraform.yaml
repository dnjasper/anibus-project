name: "Terraform & App Automation Pipeline"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  infrastructure:
    name: "Execute Cloud Blueprint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./environments/dev

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform Binary
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.2
          terraform_wrapper: false # 🚀 FIXED: Disables shell wrappers to prevent auth loops

      - name: Verify Code Syntax
        run: terraform init && terraform validate

      - name: Generate Dry-Run Plan
        run: terraform plan -input=false -refresh=false -lock=false -no-color # 🚀 FIXED: Bypasses stale S3 variable cache prompts

  application:
    name: "Build & Ship Container"
    needs: infrastructure # Waits for infrastructure checks to pass successfully first
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Authenticate with AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: anubis-api
          IMAGE_TAG: ${{ github.sha }} # Tags container with unique Git commit hash
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./apps/anubis-api
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAGi

    # ... leave the top of your .github/workflows/terraform.yaml exactly the same ...

      - name: Verify Code Syntax
        run: terraform init && terraform validate

      # 🚀 UPDATED: Run plan on Pull Requests, but run APPLY on live main branch pushes!
      - name: Deploy Live Infrastructure to AWS
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            terraform apply -input=false -auto-approve -no-color
          else
            terraform plan -input=false -no-color
          fi


